services:
  - type: web
    name: kavi-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeployTrigger: commit
    healthCheckPath: /health/live
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: kavi-postgres
          property: connectionString
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_OAUTH_REDIRECT_URI
        sync: false
      - key: GITHUB_STATE_SECRET
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: AI_MODEL
        value: gemini-2.5-flash
      - key: AI_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO

  - type: worker
    name: kavi-ingestion-worker
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.workers.ingestion_worker
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kavi-postgres
          property: connectionString
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: AI_MODEL
        value: gemini-2.5-flash
      - key: AI_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: SYNC_WORKER_POLL_SECONDS
        value: "5"

databases:
  - name: kavi-postgres
    databaseName: kavi
    plan: free
